version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: leave_mgmt_db
    environment:
      POSTGRES_USER: lms_user
      POSTGRES_PASSWORD: lms_password_dev
      POSTGRES_DB: leave_management_db
      TZ: UTC
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - leave_mgmt_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lms_user -d leave_management_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: leave_mgmt_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
      SCRIPT_NAME: /pgadmin4
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - leave_mgmt_network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  leave_mgmt_network:
    driver: bridge
